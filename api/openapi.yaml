openapi: 3.0.3
info:
  title: HB-Api-Cocktail
  version: 1.0.0
  description: |
    API du domaine Hobbies dediee aux cocktails.

    Contenu textuel des recettes en anglais.

    Deux familles d'endpoints :
      - Lecture publique : consultation et recherche des cocktails et referentiels.
      - Ecriture locale (tag `local`) : ajout d'une recette et upload d'image,
        joignable uniquement en loopback 127.0.0.1 et protege par un token.

    Ce document decrit l'integralite de la surface v1, entierement implementee et
    exposee : lecture et recherche des cocktails, referentiels, service d'images,
    ecriture locale et sonde de disponibilite.
servers:
  - url: http://127.0.0.1:8080
    description: Service local
tags:
  - name: public
    description: Lecture publique des cocktails et de la recherche.
  - name: referentials
    description: Referentiels de lecture publique (ingredients, categories, tags).
  - name: images
    description: Service d'images des cocktails.
  - name: local
    description: |
      Ecriture locale non publique. Joignable uniquement en loopback (127.0.0.1)
      et protege par un token via l'en-tete Authorization. Ne pas exposer.
  - name: system
    description: Sonde de disponibilite.
paths:
  /cocktails:
    get:
      tags: [public]
      summary: Lister les cocktails
      description: Liste paginee des cocktails, filtrable par category, strength, alcoholic, season et tag.
      operationId: listCocktails
      security: []
      parameters:
        - $ref: '#/components/parameters/CategoryFilter'
        - $ref: '#/components/parameters/StrengthFilter'
        - $ref: '#/components/parameters/AlcoholicFilter'
        - $ref: '#/components/parameters/SeasonFilter'
        - $ref: '#/components/parameters/TagFilter'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Liste paginee des cocktails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CocktailList'
              examples:
                page:
                  summary: Premiere page filtree sur category=Classic
                  value:
                    items:
                      - id: 1
                        name: Margarita
                        instructions: Rub the rim of the glass with lime and dip it in salt. Shake tequila, triple sec and lime juice with ice, then strain into the glass.
                        glass: Margarita glass
                        category: Classic
                        strength: Strong
                        alcoholic: true
                        season: Summer
                        image: margarita.jpg
                        tags: [iba, sour, tequila]
                        ingredients:
                          - { name: Lime juice, quantity: '15', unit: ml }
                          - { name: Salt, quantity: '', unit: rim }
                          - { name: Tequila, quantity: '50', unit: ml }
                          - { name: Triple sec, quantity: '20', unit: ml }
                      - id: 4
                        name: Old Fashioned
                        instructions: Stir sugar, bitters and a splash of water in the glass. Add bourbon and ice, stir, then garnish with an orange peel.
                        glass: Rocks glass
                        category: Classic
                        strength: Strong
                        alcoholic: true
                        season: Winter
                        image: old-fashioned.jpg
                        tags: [iba, strong, whiskey]
                        ingredients:
                          - { name: Angostura bitters, quantity: '2', unit: dashes }
                          - { name: Bourbon, quantity: '60', unit: ml }
                          - { name: Orange peel, quantity: '1', unit: piece }
                          - { name: Sugar, quantity: '1', unit: cube }
                    total: 2
                    limit: 20
                    offset: 0
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [local]
      summary: Ajouter un cocktail et son image
      description: |
        Cree une recette et televerse son image dans la meme requete multipart.
        Endpoint non public : joignable uniquement en loopback (127.0.0.1) et
        protege par un token via l'en-tete Authorization.
      operationId: createCocktail
      security:
        - localWriteToken: []
      requestBody:
        required: true
        description: |
          Requete `multipart/form-data` a deux parts :
            - `cocktail` (obligatoire) : recette serialisee en JSON, conforme a
              `CocktailInput`. Les champs inconnus sont refuses.
            - `image` (optionnelle) : fichier binaire jpeg, png ou webp, valide
              sur le contenu reel du fichier, taille maximale 2 Mo. Le nom du
              fichier stocke est genere par le serveur (`{id}.{ext}`).
          Authentification requise : en-tete `Authorization: Bearer <token>` et
          appel emis depuis 127.0.0.1.
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CocktailCreateForm'
            encoding:
              cocktail:
                contentType: application/json
              image:
                contentType: image/jpeg, image/png, image/webp
      responses:
        '201':
          description: Cocktail cree.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cocktail'
              examples:
                created:
                  summary: Cocktail cree avec image (nom genere par le serveur)
                  value:
                    id: 6
                    name: Negroni
                    instructions: Stir gin, Campari and sweet vermouth with ice, then strain over a large ice cube and garnish with an orange peel.
                    glass: Rocks glass
                    category: Classic
                    strength: Strong
                    alcoholic: true
                    season: All year
                    image: 6.jpg
                    tags: [bitter, gin, iba]
                    ingredients:
                      - { name: Campari, quantity: '30', unit: ml }
                      - { name: Gin, quantity: '30', unit: ml }
                      - { name: Sweet vermouth, quantity: '30', unit: ml }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /cocktails/search:
    get:
      tags: [public]
      summary: Rechercher des cocktails par ingredients
      description: |
        Recherche les cocktails contenant les ingredients fournis.
        Le parametre `match` controle la strategie : `all` exige tous les
        ingredients (defaut), `any` en exige au moins un.
      operationId: searchCocktails
      security: []
      parameters:
        - name: ingredients
          in: query
          required: true
          description: Noms d'ingredients separes par des virgules.
          schema:
            type: string
          example: lime juice,mint
        - name: match
          in: query
          required: false
          description: Strategie de correspondance.
          schema:
            type: string
            enum: [all, any]
            default: all
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: |
            Liste paginee des cocktails correspondants. Un ingredient inconnu ne
            provoque pas d'erreur : il reduit simplement les correspondances,
            jusqu'a une liste vide (`items: []`, `total: 0`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CocktailList'
              examples:
                matchAll:
                  summary: ingredients=lime juice,mint avec match=all
                  value:
                    items:
                      - id: 2
                        name: Mojito
                        instructions: Muddle mint leaves with sugar and lime juice. Add rum, top with soda water and crushed ice, then stir gently.
                        glass: Highball glass
                        category: Refreshing
                        strength: Medium
                        alcoholic: true
                        season: Summer
                        image: mojito.jpg
                        tags: [mint, refreshing, rum]
                        ingredients:
                          - { name: Lime juice, quantity: '25', unit: ml }
                          - { name: Mint, quantity: '6', unit: leaves }
                          - { name: Soda water, quantity: '', unit: top }
                          - { name: Sugar, quantity: '2', unit: tsp }
                          - { name: White rum, quantity: '50', unit: ml }
                      - id: 3
                        name: Virgin Mojito
                        instructions: Muddle mint leaves with sugar and lime juice. Top with soda water and crushed ice, then stir gently.
                        glass: Highball glass
                        category: Refreshing
                        strength: None
                        alcoholic: false
                        season: Summer
                        image: virgin-mojito.jpg
                        tags: [mint, mocktail, refreshing]
                        ingredients:
                          - { name: Lime juice, quantity: '25', unit: ml }
                          - { name: Mint, quantity: '6', unit: leaves }
                          - { name: Soda water, quantity: '', unit: top }
                          - { name: Sugar, quantity: '2', unit: tsp }
                    total: 2
                    limit: 20
                    offset: 0
                emptyMatch:
                  summary: Ingredient inconnu, aucune correspondance
                  value:
                    items: []
                    total: 0
                    limit: 20
                    offset: 0
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /cocktails/{id}:
    get:
      tags: [public]
      summary: Recuperer un cocktail
      operationId: getCocktail
      security: []
      parameters:
        - $ref: '#/components/parameters/CocktailId'
      responses:
        '200':
          description: Cocktail trouve.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cocktail'
              examples:
                margarita:
                  summary: Cocktail id=1
                  value:
                    id: 1
                    name: Margarita
                    instructions: Rub the rim of the glass with lime and dip it in salt. Shake tequila, triple sec and lime juice with ice, then strain into the glass.
                    glass: Margarita glass
                    category: Classic
                    strength: Strong
                    alcoholic: true
                    season: Summer
                    image: margarita.jpg
                    tags: [iba, sour, tequila]
                    ingredients:
                      - { name: Lime juice, quantity: '15', unit: ml }
                      - { name: Salt, quantity: '', unit: rim }
                      - { name: Tequila, quantity: '50', unit: ml }
                      - { name: Triple sec, quantity: '20', unit: ml }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /ingredients:
    get:
      tags: [referentials]
      summary: Lister les ingredients
      operationId: listIngredients
      security: []
      responses:
        '200':
          description: Liste des ingredients, triee par nom.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
              examples:
                ingredients:
                  summary: Referentiel d'ingredients
                  value:
                    - { id: 5, name: Angostura bitters }
                    - { id: 4, name: Bourbon }
                    - { id: 2, name: Lime juice }
                    - { id: 1, name: Tequila }
                    - { id: 3, name: Triple sec }
        '500':
          $ref: '#/components/responses/InternalServerError'
  /categories:
    get:
      tags: [referentials]
      summary: Lister les categories
      description: Categories distinctes portees par les cocktails.
      operationId: listCategories
      security: []
      responses:
        '200':
          description: Liste des categories, triee.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: [Classic, Modern, Refreshing]
              examples:
                categories:
                  summary: Categories distinctes du seed
                  value: [Classic, Modern, Refreshing]
        '500':
          $ref: '#/components/responses/InternalServerError'
  /tags:
    get:
      tags: [referentials]
      summary: Lister les tags
      description: Tags distincts portes par les cocktails.
      operationId: listTags
      security: []
      responses:
        '200':
          description: Liste des tags, triee.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: [iba, sour, refreshing, mocktail]
              examples:
                tags:
                  summary: Tags distincts du seed
                  value: [bitter, iba, mint, mocktail, party, refreshing, rum, sour, strong, tequila, vodka, whiskey]
        '500':
          $ref: '#/components/responses/InternalServerError'
  /images/{name}:
    get:
      tags: [images]
      summary: Recuperer l'image d'un cocktail
      description: Sert le fichier image identifie par son nom.
      operationId: getImage
      security: []
      parameters:
        - name: name
          in: path
          required: true
          description: Nom du fichier image.
          schema:
            type: string
          example: margarita.jpg
      responses:
        '200':
          description: Fichier image.
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /health:
    get:
      tags: [system]
      summary: Sonde de disponibilite
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service disponible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
components:
  securitySchemes:
    localWriteToken:
      type: http
      scheme: bearer
      description: |
        Token d'ecriture locale transmis dans l'en-tete Authorization.
        Reserve aux appels loopback 127.0.0.1.
  parameters:
    CocktailId:
      name: id
      in: path
      required: true
      description: Identifiant du cocktail.
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 1
    CategoryFilter:
      name: category
      in: query
      required: false
      description: Filtre sur la categorie.
      schema:
        type: string
      example: Classic
    StrengthFilter:
      name: strength
      in: query
      required: false
      description: Filtre sur la force.
      schema:
        type: string
      example: Strong
    AlcoholicFilter:
      name: alcoholic
      in: query
      required: false
      description: Filtre alcoolise. `false` cible les mocktails.
      schema:
        type: boolean
      example: false
    SeasonFilter:
      name: season
      in: query
      required: false
      description: Filtre sur la saison.
      schema:
        type: string
      example: Summer
    TagFilter:
      name: tag
      in: query
      required: false
      description: Filtre sur un tag.
      schema:
        type: string
      example: refreshing
    Limit:
      name: limit
      in: query
      required: false
      description: Nombre maximum d'elements retournes.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      name: offset
      in: query
      required: false
      description: Nombre d'elements ignores en tete de liste.
      schema:
        type: integer
        minimum: 0
        default: 0
  schemas:
    Cocktail:
      type: object
      required: [id, name, instructions, glass, category, strength, alcoholic, season, tags, ingredients]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Margarita
        instructions:
          type: string
          example: Shake tequila, triple sec and lime juice with ice, then strain into the glass.
        glass:
          type: string
          example: Margarita glass
        category:
          type: string
          example: Classic
        strength:
          type: string
          example: Strong
        alcoholic:
          type: boolean
          example: true
        season:
          type: string
          example: Summer
        image:
          type: string
          description: Nom de l'image, utilisable avec GET /images/{name}. Vide si absente.
          example: margarita.jpg
        tags:
          type: array
          items:
            type: string
          example: [tequila, sour, iba]
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/CocktailIngredient'
    CocktailIngredient:
      type: object
      required: [name, quantity, unit]
      properties:
        name:
          type: string
          example: Tequila
        quantity:
          type: string
          example: '50'
        unit:
          type: string
          example: ml
    CocktailList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Cocktail'
        total:
          type: integer
          description: Nombre total d'elements correspondant au filtre.
          example: 42
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0
    Ingredient:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Tequila
    CocktailCreateForm:
      type: object
      required: [cocktail]
      properties:
        cocktail:
          allOf:
            - $ref: '#/components/schemas/CocktailInput'
          description: Recette serialisee en JSON dans la part `cocktail`.
          example:
            name: Negroni
            instructions: Stir gin, Campari and sweet vermouth with ice, then strain over a large ice cube and garnish with an orange peel.
            glass: Rocks glass
            category: Classic
            strength: Strong
            alcoholic: true
            season: All year
            tags: [gin, bitter, iba]
            ingredients:
              - { name: Gin, quantity: '30', unit: ml }
              - { name: Campari, quantity: '30', unit: ml }
              - { name: Sweet vermouth, quantity: '30', unit: ml }
        image:
          type: string
          format: binary
          description: |
            Fichier image de la recette. Types acceptes : jpeg, png, webp,
            valides sur le contenu reel du fichier. Taille maximale : 2 Mo.
            Le nom du fichier stocke est genere par le serveur, le client ne le fournit pas.
    CocktailInput:
      type: object
      required: [name, instructions, glass, category, strength, alcoholic]
      properties:
        name:
          type: string
          example: Margarita
        instructions:
          type: string
          example: Shake tequila, triple sec and lime juice with ice, then strain into the glass.
        glass:
          type: string
          example: Margarita glass
        category:
          type: string
          example: Classic
        strength:
          type: string
          example: Strong
        alcoholic:
          type: boolean
          example: true
        season:
          type: string
          example: Summer
        tags:
          type: array
          items:
            type: string
          example: [tequila, sour, iba]
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/CocktailIngredientInput'
    CocktailIngredientInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Tequila
        quantity:
          type: string
          example: '50'
        unit:
          type: string
          example: ml
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: |
            Code d'erreur stable, lisible par machine. Valeurs possibles :
              - `bad_request` (400) : parametre de requete ou corps invalide.
              - `unauthorized` (401) : token d'ecriture locale manquant ou invalide.
              - `forbidden` (403) : appel refuse car l'origine n'est pas loopback.
              - `not_found` (404) : ressource introuvable (cocktail ou image).
              - `payload_too_large` (413) : charge utile trop volumineuse.
              - `internal_error` (500) : erreur interne du serveur.
          enum:
            - bad_request
            - unauthorized
            - forbidden
            - not_found
            - payload_too_large
            - internal_error
          example: not_found
        message:
          type: string
          description: Description lisible par un humain.
          example: cocktail not found
  responses:
    BadRequest:
      description: |
        Requete invalide. Le champ `message` precise la cause exacte
        (parametre de pagination ou de filtre invalide, corps multipart mal
        forme, part `cocktail` manquante, echec de validation du cocktail,
        type d'image non supporte, etc.).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalidLimit:
              summary: Parametre limit hors bornes (1..100)
              value:
                error: bad_request
                message: invalid limit parameter
            invalidCocktailId:
              summary: Identifiant de cocktail non entier ou inferieur a 1
              value:
                error: bad_request
                message: invalid cocktail id
            invalidIngredients:
              summary: Parametre ingredients vide ou trop long (max 20 noms)
              value:
                error: bad_request
                message: invalid ingredients parameter
            missingCocktailPart:
              summary: Part multipart cocktail absente ou vide (POST)
              value:
                error: bad_request
                message: missing cocktail part
            validationFailed:
              summary: Echec de validation du cocktail (POST)
              value:
                error: bad_request
                message: name is required
            unsupportedImage:
              summary: Contenu d'image non jpeg/png/webp (POST)
              value:
                error: bad_request
                message: unsupported image type
    Unauthorized:
      description: Token d'ecriture locale manquant ou invalide.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unauthorized:
              summary: Bearer absent ou ne correspondant pas a LOCAL_WRITE_TOKEN
              value:
                error: unauthorized
                message: unauthorized
    Forbidden:
      description: Appel refuse car l'origine n'est pas loopback (127.0.0.1).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            forbidden:
              summary: Requete emise depuis une adresse non loopback
              value:
                error: forbidden
                message: forbidden
    PayloadTooLarge:
      description: |
        Charge utile trop volumineuse. L'image depasse 2 Mo ou le corps
        multipart global depasse la limite acceptee.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            payloadTooLarge:
              summary: Image ou corps multipart au-dela de la limite
              value:
                error: payload_too_large
                message: request payload too large
    NotFound:
      description: Ressource introuvable (cocktail ou image).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            cocktailNotFound:
              summary: Aucun cocktail pour cet identifiant
              value:
                error: not_found
                message: cocktail not found
            imageNotFound:
              summary: Nom d'image invalide ou fichier absent
              value:
                error: not_found
                message: image not found
    InternalServerError:
      description: Erreur interne du serveur.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            internalError:
              summary: Erreur inattendue cote serveur
              value:
                error: internal_error
                message: internal server error
